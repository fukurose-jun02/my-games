<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />

  <meta property="og:title" content="My Games — 個人開発ゲームスタジオ" />
  <meta property="og:description" content="アクションからパズルまで。ブラウザですぐ遊べる個人開発ゲームコレクション。" />
  <meta property="og:url" content="https://fukurose-jun02.github.io/my-games/" />
  <meta property="og:image" content="https://fukurose-jun02.github.io/my-games/IMG_6677.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #05060a;
      --bg-soft: #0b0d14;
      --card: #12141d;
      --card-2: #1a1d29;
      --border: rgba(255, 255, 255, 0.07);
      --border-hover: rgba(255, 255, 255, 0.18);
      --text: #f5f6f8;
      --text-2: #9aa0ae;
      --text-3: #666c7a;
      --accent: #4da3ff;
      --radius: 22px;
      --font-en: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      --font-jp: "Noto Sans JP", "Hiragino Sans", sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--font-jp);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    ::selection { background: rgba(77, 163, 255, 0.35); }

    ::-webkit-scrollbar { width: 10px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: #2a2e3c; border-radius: 5px; }
    ::-webkit-scrollbar-thumb:hover { background: #3a3f52; }

    a { color: inherit; text-decoration: none; }

    /* =========================================================
       Navigation
       ========================================================= */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      background: rgba(5, 6, 10, 0.55);
      border-bottom: 1px solid var(--border);
      transition: background 0.3s;
    }
    .nav-inner {
      max-width: 1140px;
      margin: 0 auto;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .logo {
      font-family: var(--font-en);
      font-size: 19px;
      font-weight: 900;
      letter-spacing: 0.04em;
      background: linear-gradient(90deg, #7db4ff 0%, #b98aff 55%, #ff8ac2 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .nav-links {
      display: flex;
      align-items: center;
      gap: 26px;
      font-size: 13.5px;
      font-weight: 500;
      color: var(--text-2);
    }
    .nav-links a { transition: color 0.2s; }
    .nav-links a:hover { color: var(--text); }
    .nav-badge {
      font-family: var(--font-en);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.08em;
      padding: 5px 12px;
      border-radius: 999px;
      border: 1px solid var(--border-hover);
      color: var(--text-2);
    }

    /* =========================================================
       Hero
       ========================================================= */
    .hero {
      position: relative;
      min-height: 94vh;
      display: flex;
      align-items: flex-end;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: -4%;
      background-size: cover;
      background-position: center 30%;
      animation: heroZoom 22s ease-in-out infinite alternate;
      will-change: transform;
    }
    @keyframes heroZoom {
      from { transform: scale(1); }
      to   { transform: scale(1.09); }
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, var(--bg) 4%, rgba(5,6,10,0.55) 38%, rgba(5,6,10,0.15) 70%, rgba(5,6,10,0.45) 100%),
        radial-gradient(ellipse at 20% 90%, rgba(77,163,255,0.18), transparent 55%);
    }
    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 1140px;
      margin: 0 auto;
      width: 100%;
      padding: 0 24px 9vh;
    }
    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: var(--font-en);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.14em;
      color: #ffd76a;
      background: rgba(255, 215, 106, 0.1);
      border: 1px solid rgba(255, 215, 106, 0.3);
      padding: 7px 16px;
      border-radius: 999px;
      margin-bottom: 22px;
      backdrop-filter: blur(8px);
    }
    .hero-title {
      font-size: clamp(42px, 7.5vw, 88px);
      font-weight: 900;
      line-height: 1.06;
      letter-spacing: -0.02em;
      margin-bottom: 18px;
      text-shadow: 0 6px 40px rgba(0, 0, 0, 0.6);
      word-break: auto-phrase;
    }
    .hero-desc {
      font-size: clamp(15px, 1.6vw, 18px);
      color: rgba(235, 238, 245, 0.85);
      max-width: 560px;
      line-height: 1.8;
      margin-bottom: 34px;
      text-shadow: 0 2px 16px rgba(0, 0, 0, 0.7);
    }
    .hero-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .btn-primary {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      color: #0a0b10;
      font-family: var(--font-jp);
      font-size: 16px;
      font-weight: 700;
      padding: 15px 34px;
      border-radius: 999px;
      transition: transform 0.25s cubic-bezier(0.2, 0.8, 0.3, 1.2), box-shadow 0.25s;
      box-shadow: 0 8px 32px rgba(255, 255, 255, 0.18);
    }
    .btn-primary:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 14px 44px rgba(255, 255, 255, 0.28);
    }
    .btn-primary .arrow { transition: transform 0.25s; }
    .btn-primary:hover .arrow { transform: translateX(4px); }
    .btn-ghost {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      padding: 15px 28px;
      border-radius: 999px;
      border: 1px solid rgba(255, 255, 255, 0.28);
      backdrop-filter: blur(10px);
      background: rgba(255, 255, 255, 0.06);
      transition: background 0.2s, border-color 0.2s;
    }
    .btn-ghost:hover {
      background: rgba(255, 255, 255, 0.13);
      border-color: rgba(255, 255, 255, 0.5);
    }
    .hero-meta {
      display: flex;
      gap: 10px;
      margin-top: 26px;
    }
    .chip {
      font-size: 12px;
      font-weight: 600;
      color: rgba(235, 238, 245, 0.75);
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(0, 0, 0, 0.25);
      padding: 6px 14px;
      border-radius: 999px;
      backdrop-filter: blur(8px);
    }

    /* =========================================================
       Stats strip
       ========================================================= */
    .stats {
      max-width: 1140px;
      margin: 0 auto;
      padding: 56px 24px 8px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }
    .stat {
      text-align: center;
      padding: 26px 12px;
      border-radius: var(--radius);
      background: linear-gradient(180deg, var(--card) 0%, var(--bg-soft) 100%);
      border: 1px solid var(--border);
    }
    .stat-num {
      font-family: var(--font-en);
      font-size: clamp(26px, 3.5vw, 40px);
      font-weight: 900;
      background: linear-gradient(90deg, #7db4ff, #b98aff);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .stat-label {
      font-size: 12.5px;
      color: var(--text-2);
      margin-top: 6px;
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    /* =========================================================
       Games section
       ========================================================= */
    .section {
      max-width: 1140px;
      margin: 0 auto;
      padding: 72px 24px 40px;
    }
    .section-head {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      margin-bottom: 34px;
    }
    .section-eyebrow {
      font-family: var(--font-en);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.18em;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .section-title {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.15;
    }
    .section-count {
      font-family: var(--font-en);
      font-size: 13px;
      font-weight: 700;
      color: var(--text-3);
      padding-bottom: 6px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 26px;
    }

    /* ---- Game card ---- */
    .card {
      display: flex;
      flex-direction: column;
      border-radius: var(--radius);
      background: var(--card);
      border: 1px solid var(--border);
      overflow: hidden;
      transition: transform 0.35s cubic-bezier(0.2, 0.8, 0.25, 1), border-color 0.35s, box-shadow 0.35s;
      position: relative;
    }
    .card:hover {
      transform: translateY(-8px);
      border-color: var(--border-hover);
      box-shadow: 0 24px 60px -18px var(--glow, rgba(77, 163, 255, 0.35));
    }

    .card-banner {
      position: relative;
      aspect-ratio: 16 / 10;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card-banner-img {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.25, 1);
    }
    .card:hover .card-banner-img { transform: scale(1.06); }

    /* 装飾: ぼかした光の玉 */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(38px);
      opacity: 0.75;
      pointer-events: none;
    }
    .orb-1 { width: 160px; height: 160px; top: -35px; left: -25px; }
    .orb-2 { width: 130px; height: 130px; bottom: -35px; right: -15px; }

    /* 装飾: ドットパターン */
    .card-banner::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(255,255,255,0.16) 1px, transparent 1px);
      background-size: 22px 22px;
      opacity: 0.35;
      pointer-events: none;
    }

    .card-emoji {
      position: relative;
      z-index: 2;
      font-size: 84px;
      line-height: 1;
      filter: drop-shadow(0 14px 28px rgba(0, 0, 0, 0.45));
      animation: floaty 5s ease-in-out infinite;
      transition: transform 0.4s cubic-bezier(0.2, 0.8, 0.3, 1.4);
    }
    .card:hover .card-emoji { transform: scale(1.14) rotate(-4deg); }
    @keyframes floaty {
      0%, 100% { translate: 0 0; }
      50%      { translate: 0 -12px; }
    }

    /* 光が走るシャイン演出 */
    .card-banner::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(105deg, transparent 42%, rgba(255, 255, 255, 0.22) 50%, transparent 58%);
      transform: translateX(-120%);
      transition: none;
      pointer-events: none;
      z-index: 3;
    }
    .card:hover .card-banner::after {
      transform: translateX(120%);
      transition: transform 0.9s ease;
    }

    .card-body {
      padding: 22px 22px 24px;
      display: flex;
      flex-direction: column;
      flex: 1;
    }
    .card-tags {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .tag {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 4px 11px;
      border-radius: 999px;
      color: var(--tag-color, var(--accent));
      background: color-mix(in srgb, var(--tag-color, var(--accent)) 14%, transparent);
      border: 1px solid color-mix(in srgb, var(--tag-color, var(--accent)) 35%, transparent);
    }
    .tag.plain {
      color: var(--text-2);
      background: rgba(255, 255, 255, 0.05);
      border-color: var(--border);
    }
    .card-title {
      font-size: 20px;
      font-weight: 900;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }
    .card-desc {
      font-size: 13.5px;
      color: var(--text-2);
      line-height: 1.75;
      flex: 1;
      margin-bottom: 20px;
    }
    .card-play {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14.5px;
      font-weight: 700;
      padding: 12px 0;
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid var(--border);
      transition: background 0.25s, border-color 0.25s, color 0.25s;
    }
    .card:hover .card-play {
      background: var(--tag-color, var(--accent));
      border-color: transparent;
      color: #fff;
    }
    .card-play .arrow { transition: transform 0.25s; }
    .card:hover .card-play .arrow { transform: translateX(4px); }

    /* =========================================================
       CTA band
       ========================================================= */
    .cta-band {
      max-width: 1140px;
      margin: 48px auto 0;
      padding: 0 24px;
    }
    .cta-inner {
      border-radius: 28px;
      padding: clamp(40px, 6vw, 72px) clamp(24px, 5vw, 64px);
      text-align: center;
      background:
        radial-gradient(ellipse at 30% 0%, rgba(77, 163, 255, 0.22), transparent 55%),
        radial-gradient(ellipse at 75% 100%, rgba(185, 138, 255, 0.2), transparent 55%),
        var(--card);
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .cta-title {
      font-size: clamp(24px, 3.6vw, 40px);
      font-weight: 900;
      letter-spacing: -0.02em;
      margin-bottom: 14px;
    }
    .cta-desc {
      color: var(--text-2);
      font-size: 15px;
      line-height: 1.8;
      margin-bottom: 30px;
    }

    /* =========================================================
       Footer
       ========================================================= */
    footer {
      margin-top: 90px;
      border-top: 1px solid var(--border);
      padding: 44px 24px 52px;
    }
    .footer-inner {
      max-width: 1140px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .footer-logo {
      font-family: var(--font-en);
      font-weight: 900;
      font-size: 16px;
      letter-spacing: 0.04em;
      color: var(--text-2);
    }
    .footer-note {
      font-size: 12.5px;
      color: var(--text-3);
    }
    .footer-note a {
      color: var(--text-2);
      border-bottom: 1px solid var(--border-hover);
      transition: color 0.2s;
    }
    .footer-note a:hover { color: var(--text); }

    /* =========================================================
       Scroll reveal
       ========================================================= */
    .reveal {
      opacity: 0;
      transform: translateY(28px);
      transition: opacity 0.7s ease, transform 0.7s cubic-bezier(0.2, 0.8, 0.25, 1);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    @media (prefers-reduced-motion: reduce) {
      .hero-bg, .card-emoji { animation: none; }
      .reveal { opacity: 1; transform: none; transition: none; }
    }

    @media (max-width: 640px) {
      .hero { min-height: 82vh; }
      .stats { grid-template-columns: repeat(3, 1fr); gap: 10px; padding-top: 40px; }
      .stat { padding: 18px 8px; }
      .nav-links { gap: 16px; }
      .nav-links .nav-link-text { display: none; }
      .grid { grid-template-columns: 1fr; }
      .section { padding: 56px 20px 24px; }
    }
  </style>
</head>

<nav>

</nav>

<main id="top">

</main>

<footer>

      &copy; 2026 <a href="https://github.com/fukurose-jun02" target="_blank" rel="noopener">fukurose-jun02</a> · All games developed independently

  </div>
</footer>

    title: "バイクゲーム",
    genre: "レーシング",
    description: "バイクを操って障害物をかわしながら走り続けろ！スピード感抜群のレーシングゲーム。",
    iconEmoji: "🏍️",
    heroImage: "",
    gradient: "linear-gradient(135deg, #9a3412, #e8663c)",
    accent: "#ff7a4d",
    platform: "ブラウザ",
    url: "https://fukurose-jun02.github.io/bike-geme/",
    featured: false,
  },
];

/* =============================================================
   以下は描画ロジックです。通常は編集不要です。
   ============================================================= */

const esc = (s) => String(s).replace(/[&<>"']/g, (c) =>
  ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));

function renderHero(game) {
  if (!game) return;
  const hero = document.getElementById("hero");
  const bg = game.heroImage
    ? `background-image: url('${esc(game.heroImage)}');`
    : `background: ${game.gradient};`;

  hero.innerHTML = `
    <div class="hero-bg" style="${bg}"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-badge">★ FEATURED GAME</div>
      <h1 class="hero-title">${esc(game.title)}</h1>
      <p class="hero-desc">${esc(game.description)}</p>
      <div class="hero-actions">
        ${game.url
          ? `<a class="btn-primary" href="${esc(game.url)}" target="_blank" rel="noopener">今すぐ遊ぶ <span class="arrow">→</span></a>`
          : `<span class="btn-ghost">近日公開</span>`}
        <a class="btn-ghost" href="#games">ゲーム一覧を見る</a>
      </div>
      <div class="hero-meta">
        <span class="chip">${esc(game.genre)}</span>
        <span class="chip">${esc(game.platform)}</span>
        <span class="chip">無料</span>
      </div>
    </div>`;
}

function renderCards(games) {
  const grid = document.getElementById("grid");
  grid.innerHTML = games.map((g, i) => {
    const banner = g.heroImage
      ? `<div class="card-banner-img" style="background-image:url('${esc(g.heroImage)}')"></div>`
      : `<div class="card-banner-img" style="background:${g.gradient}"></div>
         <span class="orb orb-1" style="background:${g.accent}"></span>
         <span class="orb orb-2" style="background:${g.accent}"></span>
         <span class="card-emoji" style="animation-delay:${(i * 0.6).toFixed(1)}s">${g.iconEmoji || "🎮"}</span>`;

    const play = g.url
      ? `<a class="card-play" href="${esc(g.url)}" target="_blank" rel="noopener">今すぐプレイ <span class="arrow">→</span></a>`
      : `<span class="card-play" style="opacity:.5">近日公開</span>`;

    return `
      <article class="card reveal" style="--tag-color:${g.accent}; --glow:${g.accent}55; transition-delay:${(i % 3) * 0.08}s">
        <div class="card-banner">${banner}</div>
        <div class="card-body">
          <div class="card-tags">
            <span class="tag">${esc(g.genre)}</span>
            <span class="tag plain">${esc(g.platform)}</span>
          </div>
          <h3 class="card-title">${esc(g.title)}</h3>
          <p class="card-desc">${esc(g.description)}</p>
          ${play}
        </div>
      </article>`;
  }).join("");
}

function renderStats(games) {
  const genres = new Set(games.map((g) => g.genre)).size;
  document.getElementById("stats").innerHTML = `
    <div class="stat reveal"><div class="stat-num">${games.length}</div><div class="stat-label">公開タイトル</div></div>
    <div class="stat reveal" style="transition-delay:.08s"><div class="stat-num">${genres}</div><div class="stat-label">ジャンル</div></div>
    <div class="stat reveal" style="transition-delay:.16s"><div class="stat-num">FREE</div><div class="stat-label">すべて無料</div></div>`;
  document.getElementById("game-count").textContent = `${games.length} TITLES`;
  document.getElementById("nav-count").textContent = `${games.length} GAMES`;
}

renderHero(GAMES.find((g) => g.featured) || GAMES[0]);
renderStats(GAMES);
renderCards(GAMES);

const io = new IntersectionObserver((entries) => {
  entries.forEach((e) => {
    if (e.isIntersecting) {
      e.target.classList.add("visible");
      io.unobserve(e.target);
    }
  });
}, { threshold: 0.12 });
document.querySelectorAll(".reveal").forEach((el) => io.observe(el));
</script>
</body>
</html>
