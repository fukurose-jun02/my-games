<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Games</title>
  <style>
    :root {
      --accent: #0a84ff;
      --bg: #000000;
      --card-bg: #1c1c1e;
      --text-primary: #ffffff;
      --text-secondary: #8e8e93;
      --border: rgba(255,255,255,0.1);
      --radius-lg: 18px;
      --radius-icon: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ---- Header ---- */
    header {
      background: rgba(242,242,247,0.85);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    /* ========================================
       サイト名を変更してください
       ======================================== */
    .site-name {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }
    .header-sub {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ---- Main container ---- */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 24px 20px 60px;
    }

    /* ---- Hero Banner ---- */
    .hero {
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: 32px;
      cursor: pointer;
      position: relative;
      aspect-ratio: 16/9;
      display: flex;
      align-items: flex-end;
      text-decoration: none;
      color: inherit;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: transform 0.4s ease;
    }
    .hero:hover .hero-bg { transform: scale(1.03); }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0) 30%,
        rgba(0,0,0,0.65) 100%
      );
    }
    .hero-body {
      position: relative;
      z-index: 1;
      padding: 20px 22px 22px;
      width: 100%;
    }
    .hero-eyebrow {
      font-size: 12px;
      font-weight: 600;
      color: rgba(255,255,255,0.75);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .hero-title {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
      letter-spacing: -0.3px;
    }
    .hero-subtitle {
      font-size: 14px;
      color: rgba(255,255,255,0.8);
      margin-top: 4px;
    }

    .hero-app-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 14px;
    }
    .hero-icon {
      width: 46px;
      height: 46px;
      border-radius: 11px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.15);
    }
    .hero-icon img { width: 100%; height: 100%; object-fit: cover; }
    .hero-icon .emoji { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 22px; }

    .hero-app-info { flex: 1; }
    .hero-app-name { font-size: 14px; font-weight: 600; color: #fff; }
    .hero-app-desc { font-size: 12px; color: rgba(255,255,255,0.7); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 300px; }

    .btn-hero {
      padding: 7px 18px;
      border-radius: 20px;
      background: rgba(255,255,255,0.25);
      backdrop-filter: blur(10px);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      border: none;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-hero:hover { background: rgba(255,255,255,0.38); }

    /* Hero placeholder (no image) */
    .hero-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 100px;
    }

    /* ---- Section ---- */
    .section { margin-bottom: 10px; }
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 20px;
      font-weight: 700;
    }
    .section-more {
      font-size: 14px;
      color: var(--accent);
      text-decoration: none;
    }

    /* ---- App List ---- */
    .app-list {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .app-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      text-decoration: none;
      color: inherit;
      transition: background 0.12s;
      position: relative;
    }
    .app-row:not(:last-child)::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 78px;
      right: 0;
      height: 1px;
      background: var(--border);
    }
    .app-row:hover { background: rgba(0,0,0,0.03); }

    .app-row-num {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-secondary);
      width: 22px;
      text-align: center;
      flex-shrink: 0;
    }

    .app-row-icon {
      width: 60px;
      height: 60px;
      border-radius: var(--radius-icon);
      overflow: hidden;
      flex-shrink: 0;
      background: var(--bg);
      border: 1px solid var(--border);
    }
    .app-row-icon img { width: 100%; height: 100%; object-fit: cover; }
    .app-row-icon .emoji { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 28px; }

    .app-row-info { flex: 1; min-width: 0; }
    .app-row-name {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .app-row-genre {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 2px;
    }
    .app-row-desc {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .app-row-action { flex-shrink: 0; }
    .btn-view {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 20px;
      background: #e5e5ea;
      color: var(--accent);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-view:hover { background: #d1d1d6; }
    .btn-view.disabled {
      color: var(--text-secondary);
      pointer-events: none;
    }

    /* ---- Screenshots strip ---- */
    .screenshots-section { margin-bottom: 32px; }
    .screenshots-scroll {
      display: flex;
      gap: 12px;
      overflow-x: auto;
      padding-bottom: 8px;
      scrollbar-width: none;
    }
    .screenshots-scroll::-webkit-scrollbar { display: none; }
    .screenshot-item {
      flex-shrink: 0;
      width: 200px;
      height: 355px;
      border-radius: 14px;
      overflow: hidden;
      background: #e8e8ed;
      border: 1px solid var(--border);
    }
    .screenshot-item img { width: 100%; height: 100%; object-fit: cover; }
    .screenshot-item .emoji { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 60px; }

    /* ---- Footer ---- */
    footer {
      text-align: center;
      padding: 28px 20px;
      color: var(--text-secondary);
      font-size: 13px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 600px) {
      .hero-title { font-size: 20px; }
      .site-name { font-size: 22px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <!-- ========================================
         サイト名を変更してください
         ======================================== -->
    <div class="site-name">My Games</div>
    <div class="header-sub">個人開発</div>
  </div>
</header>

<div class="container" id="app"></div>

<footer>
  <!-- フッターのテキストを変更してください -->
  &copy; 2024 Your Name · All apps developed independently
</footer>

<script>
/* =============================================================
   ゲームデータ — ここを編集してゲームを追加・変更してください
   =============================================================

   FEATURED（ヒーローバナー）: featured: true のゲームが一番上の大バナーになります
   最初の featured: true のゲームのみ使われます

   各ゲームのフィールド:
     title         : ゲーム名
     genre         : ジャンル
     description   : 説明文（リストに2行表示）
     icon          : アイコン画像パス or URL（省略可）
     iconEmoji     : アイコン画像がない場合の絵文字
     heroImage     : ヒーローバナーの背景画像パス or URL（featuredのみ使用）
     heroBgColor   : ヒーローバナーの背景色（画像がない場合）
     screenshots   : スクリーンショット画像パスの配列（省略可）
     platform      : "iOS" / "iOS / Android" など
     appStoreUrl   : App Store URL（空文字 → 「近日公開」）
     featured      : true → ヒーローバナーに表示
*/
const GAMES = [
  {
    title: "サンプルゲーム 1",
    genre: "アクション",
    description: "スピード感あふれるアクションゲーム。世界中のプレイヤーとスコアを競い合おう！",
    icon: "",
    iconEmoji: "⚔️",
    heroImage: "",
    heroBgColor: "linear-gradient(135deg, #c0392b, #8e44ad)",
    screenshots: [],
    platform: "iOS",
    appStoreUrl: "https://apps.apple.com/",
    featured: true,
  },
  {
    title: "サンプルゲーム 2",
    genre: "パズル",
    description: "シンプルで奥深いパズルゲーム。ついつい夢中になる中毒性。",
    icon: "",
    iconEmoji: "🧩",
    heroImage: "",
    heroBgColor: "",
    screenshots: [],
    platform: "iOS / Android",
    appStoreUrl: "",
    featured: false,
  },
  {
    title: "サンプルゲーム 3",
    genre: "カジュアル",
    description: "暇な時間にサクッと楽しめるカジュアルゲーム。全年齢対象。",
    icon: "",
    iconEmoji: "🎮",
    heroImage: "",
    heroBgColor: "",
    screenshots: [],
    platform: "iOS",
    appStoreUrl: "https://apps.apple.com/",
    featured: false,
  },
  {
    title: "サンプルゲーム 4",
    genre: "RPG",
    description: "壮大な世界を冒険するRPG。仲間と力を合わせてラスボスを倒せ！",
    icon: "",
    iconEmoji: "🐉",
    heroImage: "",
    heroBgColor: "",
    screenshots: [],
    platform: "iOS",
    appStoreUrl: "",
    featured: false,
  },
];

/* =============================================================
   以下は描画ロジックです。通常は編集不要です。
   ============================================================= */

function iconHtml(game, size = 60, radiusClass = "app-row-icon") {
  const inner = game.icon
    ? `<img src="${game.icon}" alt="${game.title}" />`
    : `<div class="emoji">${game.iconEmoji || "🎮"}</div>`;
  return `<div class="${radiusClass}">${inner}</div>`;
}

function renderHero(game) {
  if (!game) return "";

  const bgStyle = game.heroImage
    ? `background-image: url('${game.heroImage}');`
    : `background: ${game.heroBgColor || "linear-gradient(135deg,#2c3e50,#4a6fa5)"};`;

  const inner = game.heroImage
    ? ""
    : `<div class="hero-placeholder">${game.iconEmoji || "🎮"}</div>`;

  const storeBtn = game.appStoreUrl
    ? `<a href="${game.appStoreUrl}" class="btn-hero" target="_blank" rel="noopener">表示</a>`
    : `<span class="btn-hero" style="opacity:0.6;">近日公開</span>`;

  const heroIconInner = game.icon
    ? `<img src="${game.icon}" alt="" />`
    : `<div class="emoji">${game.iconEmoji || "🎮"}</div>`;

  return `
    <a class="hero" href="${game.appStoreUrl || '#'}" target="${game.appStoreUrl ? '_blank' : '_self'}" rel="noopener"
       onclick="${game.appStoreUrl ? '' : 'return false;'}">
      <div class="hero-bg" style="${bgStyle}"></div>
      <div class="hero-overlay"></div>
      ${inner}
      <div class="hero-body">
        <div class="hero-eyebrow">おすすめ</div>
        <div class="hero-title">${game.title}</div>
        <div class="hero-subtitle">${game.description}</div>
        <div class="hero-app-row">
          <div class="hero-icon">${heroIconInner}</div>
          <div class="hero-app-info">
            <div class="hero-app-name">${game.title}</div>
            <div class="hero-app-desc">${game.genre} · ${game.platform}</div>
          </div>
          ${storeBtn}
        </div>
      </div>
    </a>`;
}

function renderList(games) {
  const rows = games.map((game, i) => {
    const storeBtn = game.appStoreUrl
      ? `<a href="${game.appStoreUrl}" class="btn-view" target="_blank" rel="noopener">表示</a>`
      : `<span class="btn-view disabled">近日公開</span>`;

    const iconInner = game.icon
      ? `<img src="${game.icon}" alt="${game.title}" />`
      : `<div class="emoji">${game.iconEmoji || "🎮"}</div>`;

    return `
      <div class="app-row">
        <div class="app-row-num">${i + 1}</div>
        <div class="app-row-icon">${iconInner}</div>
        <div class="app-row-info">
          <div class="app-row-name">${game.title}</div>
          <div class="app-row-genre">${game.genre}</div>
          <div class="app-row-desc">${game.description}</div>
        </div>
        <div class="app-row-action">${storeBtn}</div>
      </div>`;
  }).join("");

  return `
    <div class="section">
      <div class="section-header">
        <span class="section-title">すべてのゲーム</span>
      </div>
      <div class="app-list">${rows}</div>
    </div>`;
}

function render() {
  const featured = GAMES.find(g => g.featured);
  const all = GAMES;
  const container = document.getElementById("app");
  container.innerHTML = renderHero(featured) + renderList(all);
}

render();
</script>
</body>
</html>
