<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Games</title>
  <style>
    :root {
      --accent: #0a84ff;
      --bg: #000000;
      --card-bg: #1c1c1e;
      --card-bg2: #2c2c2e;
      --text-primary: #ffffff;
      --text-secondary: #8e8e93;
      --border: rgba(255,255,255,0.08);
      --radius-lg: 18px;
      --radius-icon: 14px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", "Hiragino Sans", sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
    }

    /* ---- Header ---- */
    header {
      background: rgba(28,28,30,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-inner {
      max-width: 800px;
      margin: 0 auto;
      padding: 14px 20px;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
    }
    .site-name {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }
    .header-sub {
      font-size: 13px;
      color: var(--text-secondary);
    }

    /* ---- Main container ---- */
    .container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px 16px 60px;
    }

    /* ---- Hero Card (2-part: banner + info) ---- */
    .hero-card {
      border-radius: var(--radius-lg);
      overflow: hidden;
      background: var(--card-bg);
      margin-bottom: 28px;
      text-decoration: none;
      color: inherit;
      display: block;
    }

    /* Banner area (image/gradient) */
    .hero-banner {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .hero-banner-bg {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      transition: transform 0.4s ease;
    }
    .hero-card:hover .hero-banner-bg { transform: scale(1.03); }
    .hero-banner-emoji {
      position: relative;
      z-index: 1;
      font-size: 80px;
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.4));
    }

    /* Info area below banner */
    .hero-info {
      padding: 14px 16px 16px;
      border-top: 1px solid var(--border);
    }
    .hero-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }
    .hero-title {
      font-size: 20px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 4px;
      word-break: auto-phrase;
    }
    .hero-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.45;
      margin-bottom: 14px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .hero-footer-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .hero-icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--card-bg2);
      border: 1px solid var(--border);
    }
    .hero-icon img { width: 100%; height: 100%; object-fit: cover; }
    .hero-icon .emoji {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .hero-meta { flex: 1; min-width: 0; }
    .hero-meta-name {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hero-meta-sub {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 1px;
    }
    .btn-get {
      flex-shrink: 0;
      padding: 7px 18px;
      border-radius: 20px;
      background: var(--accent);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      white-space: nowrap;
      transition: opacity 0.15s;
    }
    .btn-get:hover { opacity: 0.82; }
    .btn-get.soon {
      background: var(--card-bg2);
      color: var(--text-secondary);
      pointer-events: none;
    }

    /* ---- Section ---- */
    .section { margin-bottom: 8px; }
    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 12px;
      padding: 0 2px;
    }
    .section-title {
      font-size: 20px;
      font-weight: 700;
    }

    /* ---- App List ---- */
    .app-list {
      background: var(--card-bg);
      border-radius: var(--radius-lg);
      overflow: hidden;
    }

    .app-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      text-decoration: none;
      color: inherit;
      position: relative;
      transition: background 0.12s;
    }
    .app-row:active { background: rgba(255,255,255,0.04); }
    .app-row:not(:last-child)::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 92px;
      right: 0;
      height: 1px;
      background: var(--border);
    }

    .app-row-num {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-secondary);
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .app-row-icon {
      width: 58px;
      height: 58px;
      border-radius: var(--radius-icon);
      overflow: hidden;
      flex-shrink: 0;
      background: var(--card-bg2);
      border: 1px solid var(--border);
    }
    .app-row-icon img { width: 100%; height: 100%; object-fit: cover; }
    .app-row-icon .emoji {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: 28px;
    }

    .app-row-info { flex: 1; min-width: 0; }
    .app-row-name {
      font-size: 15px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .app-row-genre {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 2px;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      font-weight: 500;
    }
    .app-row-desc {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 3px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }

    .app-row-action { flex-shrink: 0; }
    .btn-view {
      display: inline-block;
      padding: 6px 15px;
      border-radius: 20px;
      background: #2c2c2e;
      color: var(--accent);
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-view:active { background: #3a3a3c; }
    .btn-view.disabled {
      color: var(--text-secondary);
      pointer-events: none;
    }

    /* ---- Footer ---- */
    footer {
      text-align: center;
      padding: 28px 20px;
      color: var(--text-secondary);
      font-size: 12px;
      border-top: 1px solid var(--border);
    }

    @media (max-width: 480px) {
      .hero-title { font-size: 18px; }
      .site-name { font-size: 22px; }
      .btn-get { padding: 7px 14px; font-size: 13px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <!-- ========================================
         サイト名を変更してください
         ======================================== -->
    <div class="site-name">My Games</div>
    <div class="header-sub">個人開発</div>
  </div>
</header>

<div class="container" id="app"></div>

<footer>
  <!-- フッターのテキストを変更してください -->
  &copy; 2024 Your Name · All apps developed independently
</footer>

<script>
/* =============================================================
   ゲームデータ — ここを編集してゲームを追加・変更してください
   =============================================================

   FEATURED（ヒーローバナー）: featured: true のゲームが一番上の大バナーになります
   最初の featured: true のゲームのみ使われます

   各ゲームのフィールド:
     title         : ゲーム名
     genre         : ジャンル
     description   : 説明文（リストに2行表示）
     icon          : アイコン画像パス or URL（省略可）
     iconEmoji     : アイコン画像がない場合の絵文字
     heroImage     : ヒーローバナーの背景画像パス or URL（featuredのみ使用）
     heroBgColor   : ヒーローバナーの背景色（画像がない場合）
     screenshots   : スクリーンショット画像パスの配列（省略可）
     platform      : "iOS" / "iOS / Android" など
     appStoreUrl   : App Store URL（空文字 → 「近日公開」）
     featured      : true → ヒーローバナーに表示
*/
const GAMES = [
  {
    title: "警察犬がにげろ！",
    genre: "アクション",
    description: "追いかけてくる警察犬から逃げ切れ！スリル満点の追いかけっこゲーム。",
    icon: "",
    iconEmoji: "🐕",
    heroImage: "IMG_6677.png",
    heroBgColor: "linear-gradient(135deg, #1a3a5c, #2980b9)",
    screenshots: [],
    platform: "ブラウザ",
    appStoreUrl: "https://fukurose-jun02.github.io/caterpillar-game/",
    featured: true,
  },
  {
    title: "すみっこつみつみ！",
    genre: "パズル",
    description: "すみっこのキャラたちを積み上げていく、ほっこり可愛いパズルゲーム。",
    icon: "",
    iconEmoji: "🧸",
    heroImage: "",
    heroBgColor: "linear-gradient(135deg, #f6d365, #fda085)",
    screenshots: [],
    platform: "ブラウザ",
    appStoreUrl: "https://fukurose-jun02.github.io/sumikko_tsumitsumi/",
    featured: false,
  },
  {
    title: "お姫様の塔登り",
    genre: "アクション",
    description: "お姫様を操作して高い塔を登り切れ！障害物を避けながら頂上を目指そう。",
    icon: "",
    iconEmoji: "👸",
    heroImage: "",
    heroBgColor: "linear-gradient(135deg, #f953c6, #b91d73)",
    screenshots: [],
    platform: "ブラウザ",
    appStoreUrl: "https://fukurose-jun02.github.io/princess-tower/",
    featured: false,
  },
  {
    title: "スネークゲーム",
    genre: "カジュアル",
    description: "クラシックなスネークゲーム。エサを食べて長くなるほど難しくなる！",
    icon: "",
    iconEmoji: "🐍",
    heroImage: "",
    heroBgColor: "linear-gradient(135deg, #134e5e, #71b280)",
    screenshots: [],
    platform: "ブラウザ",
    appStoreUrl: "https://fukurose-jun02.github.io/snake-game/",
    featured: false,
  },
  {
    title: "キャンディラン",
    genre: "ランゲーム",
    description: "甘い世界を駆け抜けろ！キャンディを集めながら障害物を避けるランゲーム。",
    icon: "",
    iconEmoji: "🍬",
    heroImage: "",
    heroBgColor: "linear-gradient(135deg, #fc5c7d, #6a3093)",
    screenshots: [],
    platform: "ブラウザ",
    appStoreUrl: "https://fukurose-jun02.github.io/candy-run/",
    featured: false,
  },
  {
    title: "バイクゲーム",
    genre: "レーシング",
    description: "バイクを操って障害物をかわしながら走り続けろ！スピード感抜群のレーシングゲーム。",
    icon: "",
    iconEmoji: "🏍️",
    heroImage: "",
    heroBgColor: "linear-gradient(135deg, #f7971e, #c0392b)",
    screenshots: [],
    platform: "ブラウザ",
    appStoreUrl: "https://fukurose-jun02.github.io/bike-geme/",
    featured: false,
  },
];

/* =============================================================
   以下は描画ロジックです。通常は編集不要です。
   ============================================================= */

function renderHero(game) {
  if (!game) return "";

  const bgStyle = game.heroImage
    ? `background-image: url('${game.heroImage}');`
    : `background: ${game.heroBgColor || "linear-gradient(135deg,#2c3e50,#4a6fa5)"};`;

  const bannerContent = game.heroImage
    ? ""
    : `<div class="hero-banner-emoji">${game.iconEmoji || "🎮"}</div>`;

  const iconInner = game.icon
    ? `<img src="${game.icon}" alt="${game.title}" />`
    : `<div class="emoji">${game.iconEmoji || "🎮"}</div>`;

  const btn = game.appStoreUrl
    ? `<a href="${game.appStoreUrl}" class="btn-get" target="_blank" rel="noopener" onclick="event.stopPropagation()">遊ぶ</a>`
    : `<span class="btn-get soon">近日公開</span>`;

  const href = game.appStoreUrl || "#";
  const target = game.appStoreUrl ? '_blank' : '_self';
  const onclick = game.appStoreUrl ? '' : 'onclick="return false;"';

  return `
    <a class="hero-card" href="${href}" target="${target}" rel="noopener" ${onclick}>
      <div class="hero-banner">
        <div class="hero-banner-bg" style="${bgStyle}"></div>
        ${bannerContent}
      </div>
      <div class="hero-info">
        <div class="hero-badge">おすすめ</div>
        <div class="hero-title">${game.title}</div>
        <div class="hero-subtitle">${game.description}</div>
        <div class="hero-footer-row">
          <div class="hero-icon">${iconInner}</div>
          <div class="hero-meta">
            <div class="hero-meta-name">${game.title}</div>
            <div class="hero-meta-sub">${game.genre} · ${game.platform}</div>
          </div>
          ${btn}
        </div>
      </div>
    </a>`;
}

function renderList(games) {
  const rows = games.map((game, i) => {
    const btn = game.appStoreUrl
      ? `<a href="${game.appStoreUrl}" class="btn-view" target="_blank" rel="noopener" onclick="event.stopPropagation()">遊ぶ</a>`
      : `<span class="btn-view disabled">近日公開</span>`;

    const iconInner = game.icon
      ? `<img src="${game.icon}" alt="${game.title}" />`
      : `<div class="emoji">${game.iconEmoji || "🎮"}</div>`;

    return `
      <div class="app-row">
        <div class="app-row-num">${i + 1}</div>
        <div class="app-row-icon">${iconInner}</div>
        <div class="app-row-info">
          <div class="app-row-name">${game.title}</div>
          <div class="app-row-genre">${game.genre}</div>
          <div class="app-row-desc">${game.description}</div>
        </div>
        <div class="app-row-action">${btn}</div>
      </div>`;
  }).join("");

  return `
    <div class="section">
      <div class="section-header">
        <span class="section-title">すべてのゲーム</span>
      </div>
      <div class="app-list">${rows}</div>
    </div>`;
}

function render() {
  const featured = GAMES.find(g => g.featured);
  const container = document.getElementById("app");
  container.innerHTML = renderHero(featured) + renderList(GAMES);
}

render();
</script>
</body>
</html>
